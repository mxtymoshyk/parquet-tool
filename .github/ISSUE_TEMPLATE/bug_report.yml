name: Bug report
description: Report a defect in parquet-tool
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `parquet-tool foo.parquet`
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: parquet-tool version
      description: Run `parquet-tool --version` or check `pip show parquet-tool`.
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      render: shell
